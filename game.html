<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misyong Pilipino | The Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* STATS HUD */
        #game-ui {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10; /* Lower than overlay */
            transition: opacity 0.5s;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            font-weight: bold;
            min-width: 140px;
            text-align: center;
        }

        #score { color: #3498db; }
        #timer { color: #f1c40f; }
        #lives { color: #e74c3c; }

        /* THE OVERLAY (MENU) */
        #game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999; /* TOP LAYER */
        }

        #overlay-content {
            text-align: center;
            max-width: 450px;
            padding: 40px;
            background: #151515;
            border: 2px solid #0038A8;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 56, 168, 0.3);
        }

        #overlay-title {
            color: #f1c40f;
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 15px;
        }

        #overlay-text {
            color: #bbb;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* DIFFICULTY BUTTONS */
        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .diff-btn {
            background: transparent;
            color: #777;
            border: 2px solid #333;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .diff-btn.active {
            border-color: #0038A8;
            color: white;
            background: rgba(0, 56, 168, 0.3);
        }

        .diff-btn[data-level="hard"].active {
            border-color: #CE1126;
            background: rgba(206, 17, 38, 0.3);
        }

        #start-btn {
            background: #CE1126;
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        #start-btn:hover {
            transform: scale(1.05);
            background: #e6122b;
            box-shadow: 0 0 20px rgba(206, 17, 38, 0.4);
        }

        canvas {
            background-color: #050505;
            border: 2px solid #222;
        }

        .back-home {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
            z-index: 10000;
        }
        .back-home:hover { color: #fff; }
    </style>
</head>
<body>

    <!-- HUD -->
    <div id="game-ui">
        <div class="stat-box">Awareness: <span id="score">0</span></div>
        <div class="stat-box">Time: <span id="timer">0:00</span></div>
        <div class="stat-box">Credibility: <span id="lives">100</span>%</div>
    </div>

    <!-- START/END MENU -->
    <div id="game-overlay">
        <div id="overlay-content">
            <h1 id="overlay-title">MISYONG PILIPINO</h1>
            <p id="overlay-text">Protect your credibility. Collect the <strong>Facts (Blue)</strong> and dodge <strong>Disinformation (Red)</strong>.</p>
            
            <div class="difficulty-selector">
                <button class="diff-btn active" data-level="easy">EASY</button>
                <button class="diff-btn" data-level="normal">NORMAL</button>
                <button class="diff-btn" data-level="hard">HARD</button>
            </div>

            <button id="start-btn">Magsimula Na</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <a href="index.html" class="back-home">&larr; Exit to Reality</a>

    <script src="game.js"></script>
</body>
</html>
